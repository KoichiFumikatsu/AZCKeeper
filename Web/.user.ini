; ========================================
; AZCKeeper - Configuración PHP
; Ajustes para prevenir timeouts
; ========================================

; Tiempo máximo de ejecución de scripts PHP (90 segundos)
max_execution_time = 90

; Tiempo máximo de espera para datos de entrada (90 segundos)
max_input_time = 90

; Tamańo máximo de POST (para episodios de ventana grandes)
post_max_size = 8M

; Tamańo máximo de archivos subidos
upload_max_filesize = 8M

; Memoria máxima por script
memory_limit = 128M

; Habilitar compresión de salida
zlib.output_compression = On
zlib.output_compression_level = 6

; Configuración de errores (producción)
display_errors = Off
log_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; Configuración de buffering para mejorar performance
output_buffering = 4096
